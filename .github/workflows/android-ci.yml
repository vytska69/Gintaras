name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & release debug + release APK (pure Java, all ABIs incl. arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # The release build is signed with the standard Android debug key (see
      # app/build.gradle) so the rolling FOSS APK is installable. Ensure that key
      # exists before the release build signs with it.
      - name: Ensure debug keystore exists
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build debug + release APKs
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Stage APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/gintaras-tts-debug.apk
          cp app/build/outputs/apk/release/app-release.apk dist/gintaras-tts-release.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gintaras-tts-apks
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish APKs to Releases
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Rolling "latest" release that always carries the newest debug + release APKs.
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest \
            dist/gintaras-tts-release.apk \
            dist/gintaras-tts-debug.apk \
            --title "Latest build" \
            --notes "Automated build from ${GITHUB_SHA::7}. Install the **release** APK (or debug), then pick \"WinTalker Voice\" under Settings → Text-to-speech." \
            --latest
