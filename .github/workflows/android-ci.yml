name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & release debug APK (armeabi-v7a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # NOTE: the modern-LuaJIT swap (tools/ci_build_luajit.sh) crashed the engine
      # on-device: the prebuilt librosasofttts.so depends on LuaJIT 2.1.0-alpha (2015)
      # INTERNALS, not just the public C API, so a current LuaJIT is not a drop-in.
      # Reverted to the shipped 2015 libluajit.so + committed main.bin.

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/gintaras-tts-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gintaras-tts-debug-apk
          path: dist/gintaras-tts-debug.apk
          if-no-files-found: error

      - name: Publish APK to Releases
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Rolling "latest" release that always carries the newest APK.
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest dist/gintaras-tts-debug.apk \
            --title "Latest build (debug)" \
            --notes "Automated build from ${GITHUB_SHA::7}. Install on Android, then pick \"WinTalker Voice\" under Settings → Text-to-speech." \
            --latest
