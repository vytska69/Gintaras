name: Apple build (unsigned .ipa + .pkg)

# Builds, with no Apple account and no secrets:
#   - an UNSIGNED iOS .ipa            (re-sign + sideload: AltStore / Sideloadly)
#   - an ad-hoc signed Mac Catalyst .pkg
# Both are uploaded as build artifacts. Neither is App Store / notarized — see
# the install notes in ios/README.md.
#
# Note: code-sign entitlements (App Group) are dropped for these CI artifacts —
# they need a real Apple Team to take effect, and re-signing (Sideloadly/AltStore)
# re-applies them anyway.

on:
  workflow_dispatch:
  push:
    branches: [Ios]
    paths:
      - "ios/**"
      - "core/**"
      - ".github/workflows/apple-build.yml"

jobs:
  ios-ipa:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build Rust core (iOS device only)
        working-directory: ios
        run: IPHONEOS_ONLY=1 ./build-rust.sh
      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate
      - name: Build (ad-hoc signed)
        working-directory: ios
        # Ad-hoc sign (identity "-") so the embedded extension's Info dictionary
        # loads and ValidateEmbeddedBinary passes. The .ipa still has to be
        # re-signed to install (AltStore/Sideloadly).
        run: |
          set -euo pipefail
          xcodebuild build \
            -project Gintaras.xcodeproj \
            -scheme Gintaras \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/dd \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}
      - name: Package .ipa
        working-directory: ios
        run: |
          set -euo pipefail
          APP=$(ls -d build/dd/Build/Products/Release-iphoneos/*.app | head -1)
          rm -rf build/Payload && mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          ( cd build && zip -qry Gintaras-unsigned.ipa Payload )
          ls -lh build/Gintaras-unsigned.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: Gintaras-ipa-unsigned
          path: ios/build/Gintaras-unsigned.ipa
          if-no-files-found: error

  mac-pkg:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build Rust core (Mac Catalyst only)
        working-directory: ios
        run: MACCATALYST_ONLY=1 ./build-rust.sh
      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate
      - name: Archive Mac Catalyst (ad-hoc signed)
        working-directory: ios
        # Let Xcode ad-hoc sign (identity "-") during the archive so the
        # framework/extension/app bundles are assembled and signed in the right
        # order (required to run on Apple Silicon).
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project Gintaras.xcodeproj \
            -scheme Gintaras \
            -destination 'generic/platform=macOS,variant=Mac Catalyst' \
            -archivePath build/Gintaras-mac.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}
      - name: Build .pkg
        working-directory: ios
        run: |
          set -euo pipefail
          APP=$(ls -d build/Gintaras-mac.xcarchive/Products/Applications/*.app | head -1)
          codesign --verify --deep --strict "$APP" && echo "ad-hoc signature OK"
          mkdir -p build/pkg
          productbuild --component "$APP" /Applications build/pkg/Gintaras-unsigned.pkg
          ls -lh build/pkg/Gintaras-unsigned.pkg
      - uses: actions/upload-artifact@v4
        with:
          name: Gintaras-pkg-adhoc
          path: ios/build/pkg/Gintaras-unsigned.pkg
          if-no-files-found: error
