name: Gintaras
options:
  bundleIdPrefix: com.rosasoft.wintalker
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""           # injected by CI / set in Xcode (Apple Team ID)
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Mac Catalyst: run the same app on macOS (App Store). Keep the iOS bundle id.
    SUPPORTS_MACCATALYST: "YES"
    DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

# Shared voice assets (the validated original data), bundled into both the host
# app and the extension.
fileGroups:
  - Resources

packages: {}

schemes:
  Gintaras:
    build:
      targets:
        Gintaras: all
    archive:
      config: Release
    run:
      config: Debug

targets:

  # Shared Swift wrapper around the Rust core. Linked by both the app and the
  # system voice extension.
  GintarasKit:
    type: framework
    platform: iOS
    sources:
      - path: Sources/GintarasKit
    dependencies:
      - framework: GintarasCoreFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rosasoft.wintalker.GintarasKit
        DEFINES_MODULE: "YES"
        SUPPORTS_MACCATALYST: "YES"
        GENERATE_INFOPLIST_FILE: "YES"

  # Host app: preview + settings UI.
  Gintaras:
    type: application
    platform: iOS
    info:
      path: App/Info.plist
    entitlements:
      path: App/GintarasApp.entitlements
    sources:
      - path: Sources/GintarasApp
      - path: Resources
        type: folder
        buildPhase: resources
        excludes:
          - "*.md"
    dependencies:
      - target: GintarasKit
        embed: true
      # Properly embed the system-voice extension so Xcode signs + validates it
      # as part of the app (required for App Store Connect upload + notarization /
      # AltStore PAL alternative distribution).
      - target: GintarasVoice
        embed: true
      - framework: GintarasCoreFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rosasoft.wintalker
        INFOPLIST_KEY_CFBundleDisplayName: Gintaras
        SUPPORTS_MACCATALYST: "YES"

  # System-wide Speech Synthesis Provider extension (the actual voice).
  GintarasVoice:
    type: app-extension
    platform: iOS
    info:
      path: Voice/Info.plist
    entitlements:
      path: Voice/GintarasVoice.entitlements
    sources:
      - path: Sources/GintarasVoice
      - path: Resources
        type: folder
        buildPhase: resources
        excludes:
          - "*.md"
    dependencies:
      # The framework is embedded once by the host app; the extension links it
      # and resolves it at runtime from the app's Frameworks dir.
      - target: GintarasKit
        embed: false
      - framework: GintarasCoreFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rosasoft.wintalker.GintarasVoice
        SUPPORTS_MACCATALYST: "YES"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../../Frameworks"
